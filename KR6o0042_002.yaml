body:
  text: 善寂菩薩造西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫臣施護奉詔譯復次今説生住異滅此之四相剎那剎那有所轉故不相應相而無其實於不相應無實相中不可起二分別不可説一時不可説異時一時異時無生起故又不可説無時理相違故若説壞時壞即不生故是故當知生時無住住時亦復而無所得彼無住性云何有滅彼生與住説名為異若本無生云何有住若法無住即云何得以無生故及無住故於何義中而説有滅若法有住於住法中可説異性法既無住何有異性無異性中不應分別當知異性而非住性實無一性而可分別是故諸相及分別心此為二種若無諸相即無分別若彼諸相若分別心有分別者二俱分別如實義者無相無分別生住異滅若有性者於一切時一切處一切法初中後分不可安立若能如是如理思惟者佛説是人名為大智初分中分後分諸性於三分性中實無一性有所生起是故諸法非一性非多性一多中間俱無所得若一切法離一性離多性即常與無常無所分別是故非無常非非無常不應於中起二分別當知初分中分後分不俱時生不俱時有如他人性即自所無若自體性他云何有此中所説自性尚無他性何有是故自亦無性他亦無性當知一切法所行所作不離因性若壞不壞非心所思不可分別初中後分如實思惟皆無為相無別異相不應分別彼彼諸法各各種子彼各各性一一不離智種子生剎那剎那時分轉易是故彼彼一切法性云何心能思惟生起一切法中差別事相當知無因亦無差別諸法本來無所造作雖作用相續當何有實是故所知諸法及能知者是二於剎那中不能和合彼如是性實無能取是中無所有亦無所得當觀諸法生已即壞若法不壞即非生法以法壞故而無所得彼不壞者是常住性即常住性彼亦復離即離之言是中亦離若如是知即了諸法彼差別性是常住因無差別性亦復如是諸有為法即生即滅故名無住若有住者應有所得以無住相無所得故彼無住法是故相應一切行中諸差別行若彼彼性有所得者於無差別行云何對治是故差別行中無性可生復次當知眼等諸識有現量性大牟尼師親所宣説若離現量性別取量非量者彼於此中當云何得世間所有先所作事皆無所依如諸所作無作用性若彼如是諸現前事如其現前亦無所成是中若有所行及非所行即諸作用義皆相違是故一切無實作事皆如虛空常與無常俱不可執當知諸法皆從緣生雖生亦無少法可得緣如幻故所生如幻即彼如是出生諸法以是義故諸法無性亦非無性此如是義正等正覺如實宣説當知一切法無著無礙於大乘中此真實説如是了知即菩提心本來平等十方三世一切如來如實知故出生方便宣説一切甚深法門如其所應名言分別是故各各宣説表示出生諸法所謂彼彼法是四諦法彼彼法是唯識法雖有所説而常真實彼彼諸法皆悉如幻由如幻故不可尋不可伺不可知無表示無攝藏若離如是等即知法真實以知真實故而菩提心速得解脫若菩提心如是解脫即諸佛亦然衆生亦然生死亦然涅盤亦然法界亦然是故佛與衆生二俱平等生死涅盤亦復平等若於此中如是如實了知是義佛説此為諸佛菩提乃於一切所行所作悉能成辦此所説義是第一義離此無別有第一義此第一義攝一切法是不思議真實語行離有離無非智非愚非少非多無相無性無所照達智不可知識不可識不即自性不離自性無取無捨離取捨相從如實智之所出生隨所出生隨所言説無取相無攝藏非心所思不可知故非眼所見不可見故何以故心無自性故由心無自性即一切法無自無他以無自他二種差別即一切法自性相應無生無滅無集無散非智非愚無有少法有所表示有所照達當知彼彼菩提種子而彼彼相為表了故若能於彼彼相觀無我者菩提種子亦無所生諸菩薩摩訶薩自性真實以善方便出現世間起大悲心示有所證而諸菩薩自性真實無生無滅當知識法遠離疑惑無有少法而可生起我我所空而無有相顯了表示識相光明而無自性然光明性彼性自常是故我相性者無有光明無光明中云何可説有光明相如諸光明而能破暗然暗與明不近不合不近故明何能破不合故暗何所破若明暗相遠又俱無所得是故當知明能破暗不即不離不可於中定實分別暗雖有破無能破法彼能破法無別分量何以故破名無住故由此應知彼一切法因緣和合而有所生以緣生故如幻而成如幻法中彼癡暗等亦非煩惱但為智障而不了故離識分別亦非光明有所生起是二實性俱無分別此中見邊而實無得復次當知觸作意受想思欲勝解念定慧如是等心所有法彼彼皆是菩提之相而彼一一自性清淨若或有法非菩提相者而於自體理不相應當如虛空自性清淨而彼智性亦然清淨若知我相實無所有即彼識心亦復無生若識無生者彼一切法當云何有是故應知諸法皆從真實所生諸法因緣和合即生雖生無實而無所有諸法如幻識心如幻緣亦如幻由如是故識從緣生當知智性亦復如幻無所分別無所了知諸法自相非智所知但有言説皆不相應此中若能離諸分別若生若滅皆悉遠離緣生如幻所生亦如幻云何如幻中而實有生當知識心彼如幻故智亦如幻智如幻故所知亦如幻智與所知俱如幻故生法亦然生法如幻故諸法亦然如人見彼幻所作象如其所生即有三事世間諸行亦復如是如其所生亦有三事若於此心有所見者即有言説及所作事若了無心即無所思無心無思法云何有若有我相及有我所可説有見無我我所當云何見彼菩提相亦云何證此無我相如是應知一切幻法而無所有如幻所現説名為有有性無性彼自性性此性無著一切處現若法是有即不應無此有亦復現前無體若法是無即不應有此無亦復現前有實是故無生亦無攝藏由此應知若法言有不如是有若不如是有即應是無此中言有又不可定記法界自性應如是説若諸色法是實有體於第一義然無所有是故此中諸所作事皆從幻化分別起故若法有性若法無性本自如是若非有性若非無性亦復如是有性無性自性相應性與無性非心分別若有説言諸法是一一無自性若有説言諸法是異異無自性一切法中無自性性説不可得所有諸佛隨三世轉普令世間一切衆生盡得解脫而諸佛界無增長因彼彼亦復無增長性真實性中諸佛常有當知一切法四種分別所謂若有若無是二非二世間如幻心亦如幻云何無説而有所説一切法空離諸所著空亦不離彼真如性是中不應戲論分別以是義故諸法無性應如是説當知諸佛正等正覺非性非無性性與無性皆離著故此即非空亦非不空空有中間亦無所立是故一切法無生無性以無生無性故隨諸有相處處表示然其執相義無所得無實取性是即真實諸法無生亦復無滅彼一切法皆同一相此中如是同一相故即一切法無染無淨若言諸法有生有滅當知皆從煩惱種子虛妄生起若説諸法為無生者彼説名為斷見增語若説諸法為無滅者彼説名為常見增語是故應知諸法離言不可説生不可説滅一切法中若生若滅實無少法而有所得若能離彼二種增語即一切法非斷非常有性無性性自真實此中無有少法是所得相無有一事而實可轉諸法雖生而無所有是中亦復無實境界智如虛空離諸有相智與虛空皆悉平等當知一切差別分別為煩惱網礙清淨性真如無相離諸所緣自性清淨有大光明是故當知諸佛世尊本真如性是為佛寶以清淨因示清淨法開生正解自性任持是為法寶指真實道自體相應是為僧寶如是三寶皆無為相非蘊等法無所集無所有無有相無分別是故諸佛世尊住勝義諦從如實道如實而來故名如來如實了知無我等法是故現諸色相及功德法從初發心修諸勝行得不退轉乃至最後一生補處成等正覺此所因者從無垢真如現諸佛身此所現身是方便生宣説諸法然無説相何以故無性無所有故識心清淨是識即有諸所作事亦如是現雖現無取而亦無説以勝義諦不可取不可説故即此無取及無説性體自真實亦不可説以不可説即無分別無分別性是勝義諦於勝義諦中隨事分別所有所有諸法聲如是如是諸法説彼彼諸法無説相諸法法性皆平等諸法無我亦無自性有性無性彼彼自性離有離無而不可取亦不可説此中如是若有若無語義甚深離相而説諸法無證相此名正等覺諸法離説相是名真實説無生亦無滅諸法甚深義各各諸境界無我而無轉外法不可轉外法不可取施戒等諸法雖説而無相是故於一切法無所取相即無所著此中亦復無別作用設有所作事亦説名為空作用空故無實行相無實行相中法無增無減若於諸法虛妄分別當知彼心執相中轉起彼心故是愚癡者著煩惱性彼非解脫若不起彼虛妄分別諸所作事皆悉寂靜彼能如實而得解脫無分別故心性常寂是故諸法從緣而生雖有所生説名為空當觀自法而無有相正等正覺作如是説當知諸法無集無散無自無他無有少法取相可得如初亦如後初後相應而彼真如性光明照若能照達彼真如性諸法緣生現而無礙如幻所生亦如是説此所宣説大乘出生當知一切法若生若滅非尋伺道而能知故何以故諸語義邊無所著故彼真實性不可知故是故現前無所取著智者如實離諸言説彼分別心説名為網離分別故即得解脫彼解脫心如空平等如是所説是甚深法若於此中如實信解是大智者彼信解心與三界等是心清淨離諸塵垢復能遠離一切染著即於諸法無取無捨一切執著愚癡皆悉遠離彼能獲得十種自在彼於自法覺了實性無自性中亦無所住於諸法中如實信解如所信解如實而住譬如虛空周遍無缺彼一切法圓滿出生亦復如是是法平等普遍一切是中無法若來若去無來去故諸法現前知是義者通達佛教一切生法悉無所著異此亦復無別有法此是大乘諸法要道最上甚深如實而轉識心淨故一切無著與一切法理不相違是故當知一切執心盡處有法彼法甚深非智所觀非所了知有無二處俱不可立以是義故諸佛菩提無能證者無所證處菩提法中無所安立若能如實證自佛者與一切法而自相應諸法無因亦無所作諸愚癡者思惟分別若執無因又復不能集諸福事起染著心感惡趣報是故智者於此甚深微妙法中如實信解尊重恭敬即得無量最上福聚是名真實修大乘者是故若人覺了此道是如實道是無著道最上最勝而能發生清淨信者諸佛稱讚有諸無智邪見外道不能捨彼諸執著心此甚深法不應為説若為説者理不相應我所稱讚最上法初中後善理相應總攝最上真實句甚深微妙不思議集諸功德量無邊普施一切衆生界
